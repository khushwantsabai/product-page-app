# Learn more about configuring your app at https://shopify.dev/docs/apps/tools/cli/configuration

client_id = "06fec0d0f3013071adbb80cf7190b42b"
name = "Product Page"
application_url = "https://pagecraft.electrosale.shop"
embedded = true

[build]
automatically_update_urls_on_dev = true

[webhooks]
api_version = "2026-07"

  [[webhooks.subscriptions]]
  uri = "/webhooks/privacy/customers_data_request"
  compliance_topics = [ "customers/data_request" ]

  [[webhooks.subscriptions]]
  uri = "/webhooks/privacy/customers_redact"
  compliance_topics = [ "customers/redact" ]

  [[webhooks.subscriptions]]
  uri = "/webhooks/privacy/shop_redact"
  compliance_topics = [ "shop/redact" ]

  [[webhooks.subscriptions]]
  uri = "/webhooks/app/uninstalled"
  topics = [ "app/uninstalled" ]

[access_scopes]
# Learn more at https://shopify.dev/docs/apps/tools/cli/configuration#access_scopes
scopes = "read_customers,read_orders,read_products,read_script_tags,read_themes,write_products,write_script_tags,write_themes"

[auth]
redirect_urls = [
  "https://pagecraft.electrosale.shop/auth/callback",
  "https://pagecraft.electrosale.shop/auth/shopify/callback",
  "https://pagecraft.electrosale.shop/api/auth"
]

[app_proxy]
url = "https://pagecraft.electrosale.shop/app/proxy"
subpath = "product-page"
prefix = "apps"
