# Learn more about configuring your app at https://shopify.dev/docs/apps/tools/cli/configuration

client_id = "06fec0d0f3013071adbb80cf7190b42b"
application_url = "https://pagecraft.electrosale.shop"
embedded = true
name = "Product Page"

[access_scopes]
# Learn more at https://shopify.dev/docs/apps/tools/cli/configuration#access_scopes
scopes = "read_products, write_products, read_themes, write_themes, read_script_tags, write_script_tags, read_customers, read_orders"

[webhooks]
api_version = "2026-07"

  [[webhooks.subscriptions]]
  uri = "/webhooks/app/uninstalled"
  topics = [ "app/uninstalled" ]

  # [[webhooks.subscriptions]]
  # uri = "/webhooks/app/subscriptions_update"
  # topics = [ "app/subscriptions_update" ]

  [webhooks.privacy_compliance]
  customer_deletion_url = "https://pagecraft.electrosale.shop/webhooks/privacy/customers_redact"
  customer_data_request_url = "https://pagecraft.electrosale.shop/webhooks/privacy/customers_data_request"
  shop_deletion_url = "https://pagecraft.electrosale.shop/webhooks/privacy/shop_redact"

[auth]
redirect_urls = [ 
  "https://pagecraft.electrosale.shop/auth/callback",
  "https://pagecraft.electrosale.shop/auth/shopify/callback",
  "https://pagecraft.electrosale.shop/api/auth"
]

[build]
automatically_update_urls_on_dev = true

[app_proxy]
url = "https://pagecraft.electrosale.shop/app/proxy"
subpath = "product-page"
prefix = "apps"
